name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-android-plugin:
    name: Build Android Plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot export templates
        run: |
          GODOT_VERSION="4.3-stable"
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          mkdir -p /tmp/godot-templates
          wget -q "$TEMPLATES_URL" -O /tmp/godot-templates/templates.tpz
          cd /tmp/godot-templates
          unzip -q templates.tpz
          mkdir -p $GITHUB_WORKSPACE/android/plugin/libs
          cp templates/android_source.zip /tmp/godot-templates/
          # Extract godot-lib from android source
          unzip -q android_source.zip -d /tmp/godot-android
          cp /tmp/godot-android/libs/godot-lib.template_release.aar $GITHUB_WORKSPACE/android/plugin/libs/godot-lib.aar

      - name: Build plugin with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :plugin:assembleRelease

      - name: Verify AAR output
        run: |
          AAR_PATH="android/plugin/build/outputs/aar/plugin-release.aar"
          if [ ! -f "$AAR_PATH" ]; then
            echo "ERROR: Plugin AAR not found at $AAR_PATH"
            exit 1
          fi
          echo "Plugin AAR built successfully: $(du -h $AAR_PATH | cut -f1)"

      - name: Upload plugin AAR
        uses: actions/upload-artifact@v4
        with:
          name: SolanaMWA-plugin
          path: android/plugin/build/outputs/aar/plugin-release.aar

  run-gdscript-tests:
    name: GDScript Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          GODOT_VERSION="4.3-stable"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64
          sudo mv /tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot

      - name: Run unit tests
        run: |
          godot --headless --script tests/scripts/run_tests.gd --quit 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Tests failed with exit code $EXIT_CODE"
            exit 1
          fi

  lint-gdscript:
    name: GDScript Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install gdtoolkit
        run: pip install gdtoolkit==4.*

      - name: Lint GDScript files
        run: |
          gdlint addons/solana_mwa/scripts/*.gd
          gdlint example/scripts/*.gd
